name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  validate-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint:check

      - name: Type check (TypeScript)
        run: npm run typecheck

      - name: Run E2E tests
        env:
          NODE_ENV: test
          PORT: 3000
          LOG_LEVEL: log,warn,error,debug,verbose
        run: npm run test:e2e
